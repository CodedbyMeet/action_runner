name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Website
        run: |
          sudo rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./Twitter/ /var/www/html/

      - name: Restart Apache2
        run: |
          sudo systemctl restart apache2
